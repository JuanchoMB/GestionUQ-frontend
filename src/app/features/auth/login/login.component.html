<div class="login-page animated-page" #loginPage>
  <section class="login-hero">
    <div class="hero-card">
      <div class="hero-logo-card">
        <img
          src="assets/logo-uq.png"
          alt="Universidad del Quindío"
          class="hero-logo"
        />
      </div>

      <div class="hero-text">
        <h1>Sistema de gestión de Solicitudes Académicas</h1>
        <p>
          Registro, clasificación, priorización, asignación, seguimiento y cierre auditable
          de trámites académicos.
        </p>
      </div>
    </div>
  </section>

  <section class="login-panel">
    <form class="card login-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="card-body">
        <h2>Iniciar sesión</h2>
        <p class="muted">Ingresa con las credenciales registradas.</p>

        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

        <div class="form-row">
          <label for="username">Usuario</label>
          <input
            id="username"
            formControlName="username"
            autocomplete="username"
            placeholder="admin1"
          >
          <small
            class="error"
            *ngIf="form.controls.username.touched && form.controls.username.invalid"
          >
            El usuario es obligatorio.
          </small>
        </div>

        <div class="form-row">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="123456"
          >
          <small
            class="error"
            *ngIf="form.controls.password.touched && form.controls.password.invalid"
          >
            La contraseña es obligatoria.
          </small>
        </div>

        <button class="btn btn-primary full-btn" type="submit" [disabled]="loading">
          {{ loading ? 'Validando...' : 'Entrar al sistema' }}
        </button>
      </div>
    </form>
  </section>
</div>
